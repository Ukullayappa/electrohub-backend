# render.yaml — Render.com infrastructure definition
# Commit this file to your repo. Render will detect it automatically.
#
# Services defined:
#   1. electrohub-api   — Node.js web service (backend)
#   2. electrohub-db    — PostgreSQL managed database
#
# After first deploy, run the seed script once from Render Shell:
#   node db/seed.js

services:
  # ── Node.js Backend API ─────────────────────────────────────────────────
  - type: web
    name: electrohub-api
    runtime: node
    rootDir: backend
    plan: free                        # upgrade to Starter for always-on
    region: oregon                    # choose closest to your users

    buildCommand: npm install
    startCommand: npm start

    # Environment variables — set sensitive values in the Render dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: electrohub-db
          property: connectionString  # Render injects this automatically
      - key: JWT_SECRET
        generateValue: true           # Render generates a random secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false                   # Set this in the dashboard to your Vercel URL
                                      # e.g. https://electrohub.vercel.app
    healthCheckPath: /api/health

  # ── PostgreSQL Database ─────────────────────────────────────────────────
databases:
  - name: electrohub-db
    databaseName: electrohub
    user: electrohub_user
    plan: free
    region: oregon
